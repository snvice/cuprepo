<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <title>❤️ cupcake</title>
  </head>
  <body>
    <header class="site-header">
      <h1 class="site-header__name">Sylvia Njeri</h1>
      <div class="site-header__meta">
        <h4 class="site-header__meta-item">Mrs. Ngere</h4>
        <h4 class="site-header__meta-item">cupcake</h4>
      </div>
    </header>
    <main>
      <section class="birthday-hero">
        <h2 class="birthday-hero__title">
          Hap<span class="birthday-hero__title-accent">py Birthday</span>
        </h2>
        <div class="age-stats">
          <div class="age-stats__card">
            <p class="age-stats__value">32</p>
            <p class="age-stats__label">YEARS</p>
          </div>
          <div class="age-stats__card">
            <p class="age-stats__value">06</p>
            <p class="age-stats__label">MONTHS</p>
          </div>
          <div class="age-stats__card">
            <p class="age-stats__value">28</p>
            <p class="age-stats__label">DAYS</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
